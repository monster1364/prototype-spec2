name: 🔔 Proto PR → Slack

on:
  deployment_status:

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    # Vercel preview deployment이 성공했을 때만 실행
    if: |
      github.event.deployment_status.state == 'success' &&
      contains(github.event.deployment.environment, 'Preview')

    steps:
      - name: Find PR for this deployment
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentRef = context.payload.deployment.ref
            console.log(`Deployment ref: ${deploymentRef}`)

            // ref가 SHA인 경우 브랜치명을 별도로 찾는다
            const { data: deployment } = await github.rest.repos.getDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment.id,
            })
            console.log(`Deployment payload ref: ${deployment.ref}`)

            // SHA인지 브랜치명인지 판단 (SHA는 40자 hex)
            const isSha = /^[0-9a-f]{40}$/i.test(deploymentRef)
            let branchName = deploymentRef

            if (isSha) {
              // SHA → 해당 커밋을 head로 가진 open PR을 검색
              const { data: prsForSha } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
              })
              const matched = prsForSha.find(pr => pr.head.sha === deploymentRef)
              if (matched) {
                branchName = matched.head.ref
              } else {
                console.log(`No open PR found for SHA: ${deploymentRef}`)
                core.setOutput('found', 'false')
                return
              }
            }

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branchName}`,
              state: 'open',
            })

            if (!prs.length) {
              console.log(`No open PR found for branch: ${branchName}`)
              core.setOutput('found', 'false')
              return
            }

            const pr = prs[0]

            // GitHub display name 가져오기 (없으면 username 사용)
            const { data: user } = await github.rest.users.getByUsername({
              username: pr.user.login,
            })

            core.setOutput('found', 'true')
            core.setOutput('number', String(pr.number))
            core.setOutput('title', pr.title)
            core.setOutput('url', pr.html_url)
            core.setOutput('author', user.name || pr.user.login)
            core.setOutput('base', pr.base.sha)
            core.setOutput('head', pr.head.sha)
            core.setOutput('body', pr.body || '')

      - name: Checkout
        if: steps.pr.outputs.found == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze & notify
        if: steps.pr.outputs.found == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_OMS: ${{ secrets.SLACK_WEBHOOK_OMS }}
          SLACK_WEBHOOK_NUFLAAT: ${{ secrets.SLACK_WEBHOOK_NUFLAAT }}
          SLACK_WEBHOOK_GM: ${{ secrets.SLACK_WEBHOOK_GM }}
          SLACK_WEBHOOK_DEFAULT: ${{ secrets.SLACK_WEBHOOK_DEFAULT }}
          PREVIEW_URL: ${{ github.event.deployment_status.target_url }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_URL: ${{ steps.pr.outputs.url }}
          PR_BODY: ${{ steps.pr.outputs.body }}
          AUTHOR: ${{ steps.pr.outputs.author }}
          BASE_SHA: ${{ steps.pr.outputs.base }}
          HEAD_SHA: ${{ steps.pr.outputs.head }}
        run: |
          git fetch --depth=100 origin $BASE_SHA $HEAD_SHA 2>/dev/null || true
          python3 .github/scripts/proto_notify.py
